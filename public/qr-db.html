<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="description" content="Scan to view Dave Bill's business card at Resilience.">
    <title>QR Code – Dave Bill | Resilience</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0f0f0;
            --text: #1a1a1a;
            --text-secondary: #505050;
            --border: #1a1a1a;
            --accent: #2b4c7e;
            --accent-hover: #1e3a5f;
            --accent-light: #e8eef5;
            --accent-centre: #5b8abf;
            --accent-dark: #1a3356;
            --surface: #ffffff;
            --on-accent: #ffffff;
            --border-mid: #cccccc;
            --border-light: #eeeeee;
            --mono: 'IBM Plex Mono', 'Courier New', monospace;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--mono);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 1rem;
            background: var(--accent);
            color: var(--on-accent);
            padding: 0.5rem 1rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            text-decoration: none;
            z-index: 100;
        }

        .skip-link:focus { top: 1rem; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 4rem) clamp(1rem, 4vw, 2rem);
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            display: inline-block;
            margin-bottom: clamp(2rem, 4vw, 3rem);
        }

        .logo svg {
            width: clamp(56px, 8vw, 80px);
            height: clamp(56px, 8vw, 80px);
        }

        header {
            margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
        }

        h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
            line-height: 1.2;
            color: var(--accent);
        }

        .tagline {
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* --- QR Card --- */
        .qr-card {
            background-color: var(--surface);
            border: 1px solid var(--border-mid);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        #qr-canvas {
            display: block;
            /* size set by JS; cap at 80vmin so it fills phone screens nicely */
            max-width: min(80vmin, 320px);
            max-height: min(80vmin, 320px);
            width: auto;
            height: auto;
            image-rendering: pixelated;
        }

        .qr-meta {
            text-align: center;
        }

        .qr-name {
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.15rem;
        }

        .qr-url {
            font-size: clamp(0.65rem, 1.4vw, 0.75rem);
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        footer {
            margin-top: auto;
            padding: 2rem clamp(1rem, 4vw, 2rem);
            border-top: 1px solid var(--accent);
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 400px) {
            .container {
                padding: 1.5rem 0.75rem;
            }
        }

        @media print {
            body { background: white; color: black; }
            .skip-link { display: none; }
        }
    </style>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>

<main id="main" class="container">

    <!-- Logo -->
    <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Resilience logo: nested squares converging to a solid centre">
            <rect x="5" y="5" width="90" height="90" fill="none" stroke="var(--accent)" stroke-width="3"/>
            <rect x="15" y="15" width="70" height="70" fill="none" stroke="var(--accent)" stroke-width="2"/>
            <rect x="25" y="25" width="50" height="50" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
            <rect x="35" y="35" width="30" height="30" fill="var(--accent-centre)"/>
            <line x1="50" y1="0" x2="50" y2="5" stroke="var(--accent)" stroke-width="2"/>
            <line x1="50" y1="95" x2="50" y2="100" stroke="var(--accent)" stroke-width="2"/>
            <line x1="0" y1="50" x2="5" y2="50" stroke="var(--accent)" stroke-width="2"/>
            <line x1="95" y1="50" x2="100" y2="50" stroke="var(--accent)" stroke-width="2"/>
        </svg>
    </div>

    <!-- Header -->
    <header>
        <h1><a href="/" style="color: var(--accent); text-decoration: none;">Resilience</a></h1>
        <p class="tagline">Software &amp; Strategy Studio</p>
    </header>

    <!-- QR Code -->
    <div class="qr-card" role="img" aria-label="QR code linking to Dave Bill's business card at resilience.rodeo/businesscard-db">
        <canvas id="qr-canvas"></canvas>
        <div class="qr-meta">
            <p class="qr-name">Dave Bill &mdash; Resilience</p>
            <p class="qr-url">resilience.rodeo/businesscard-db</p>
        </div>
    </div>

</main>

<footer>
    <p>&copy; Resilience 2026</p>
</footer>

<script src="qrcode.min.js"></script>
<script>
(function () {
    var TARGET_URL = 'https://resilience.rodeo/businesscard-db';
    var RENDER_PX = 600; // high-res internal canvas; CSS clamps display size

    var qr = qrcode(0, 'M');
    qr.addData(TARGET_URL);
    qr.make();

    var canvas = document.getElementById('qr-canvas');
    var modCount = qr.getModuleCount();
    var quiet = 4;
    var total = modCount + quiet * 2;
    var scale = Math.ceil(RENDER_PX / total);
    var size = total * scale;

    canvas.width = size;
    canvas.height = size;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';

    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000000';

    for (var r = 0; r < modCount; r++) {
        for (var c = 0; c < modCount; c++) {
            if (qr.isDark(r, c)) {
                ctx.fillRect((c + quiet) * scale, (r + quiet) * scale, scale, scale);
            }
        }
    }
}());
</script>

</body>
</html>
