<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3356"/>
      <stop offset="100%" stop-color="#2b4c7e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Decorative nested squares — large, right-anchored -->
  <g opacity="0.12" transform="translate(1200, 198)">
    <rect x="-180" y="-180" width="360" height="360" fill="none" stroke="#ffffff" stroke-width="6"/>
    <rect x="-140" y="-140" width="280" height="280" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-60"  y="-60"  width="120" height="120" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-30"  y="-30"  width="60"  height="60"  fill="#5b8abf"/>
    <line x1="0" y1="-180" x2="0" y2="-190" stroke="#ffffff" stroke-width="4"/>
    <line x1="0" y1="180"  x2="0" y2="190"  stroke="#ffffff" stroke-width="4"/>
    <line x1="-180" y1="0" x2="-190" y2="0" stroke="#ffffff" stroke-width="4"/>
    <line x1="180"  y1="0" x2="190"  y2="0" stroke="#ffffff" stroke-width="4"/>
  </g>

  <!-- Decorative nested squares — medium, far right -->
  <g opacity="0.07" transform="translate(1460, 100)">
    <rect x="-110" y="-110" width="220" height="220" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="-75"  y="-75"  width="150" height="150" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-42"  y="-42"  width="84"  height="84"  fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-20"  y="-20"  width="40"  height="40"  fill="#5b8abf"/>
  </g>

  <!-- Decorative nested squares — small, top-left echo -->
  <g opacity="0.07" transform="translate(80, 60)">
    <rect x="-55" y="-55" width="110" height="110" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-35" y="-35" width="70"  height="70"  fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-16" y="-16" width="32"  height="32"  fill="#5b8abf"/>
  </g>

  <!-- Logo mark — left side -->
  <g transform="translate(120, 198)">
    <rect x="-56" y="-56" width="112" height="112" fill="none" stroke="#ffffff" stroke-width="3.5"/>
    <rect x="-42" y="-42" width="84"  height="84"  fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="-28" y="-28" width="56"  height="56"  fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="-18" y="-18" width="36"  height="36"  fill="#5b8abf"/>
    <line x1="0" y1="-56" x2="0" y2="-62" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="0" y1="56"  x2="0" y2="62"  stroke="#ffffff" stroke-width="2.5"/>
    <line x1="-56" y1="0" x2="-62" y2="0" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="56"  y1="0" x2="62"  y2="0" stroke="#ffffff" stroke-width="2.5"/>
  </g>

  <!-- Wordmark: RESILIENCE -->
  <text
    x="230" y="178"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="72"
    font-weight="700"
    letter-spacing="18"
    text-transform="uppercase"
    fill="#ffffff"
  >RESILIENCE</text>

  <!-- Tagline -->
  <text
    x="233" y="228"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="22"
    font-weight="400"
    letter-spacing="8"
    fill="#a8c0de"
  >SOFTWARE &amp; STRATEGY STUDIO</text>

  <!-- Subtle bottom rule -->
  <rect x="0" y="388" width="1584" height="4" fill="#5b8abf" opacity="0.5"/>
</svg>
