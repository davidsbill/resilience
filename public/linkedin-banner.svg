<svg viewBox="0 0 1128 191" xmlns="http://www.w3.org/2000/svg" width="1128" height="191">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3356"/>
      <stop offset="100%" stop-color="#2b4c7e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- Decorative nested squares — large, right side -->
  <g opacity="0.10" transform="translate(880, 96)">
    <rect x="-110" y="-110" width="220" height="220" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="-80"  y="-80"  width="160" height="160" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-52"  y="-52"  width="104" height="104" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-28"  y="-28"  width="56"  height="56"  fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="-14"  y="-14"  width="28"  height="28"  fill="#5b8abf"/>
  </g>

  <!-- Decorative nested squares — medium, far right -->
  <g opacity="0.06" transform="translate(1050, 45)">
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-38" y="-38" width="76"  height="76"  fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-18" y="-18" width="36"  height="36"  fill="#5b8abf"/>
  </g>

  <!-- Decorative nested squares — small, top-left -->
  <g opacity="0.06" transform="translate(55, 30)">
    <rect x="-28" y="-28" width="56" height="56" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-16" y="-16" width="32" height="32" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="-8"  y="-8"  width="16" height="16" fill="#5b8abf"/>
  </g>

  <!-- Logo mark — left side -->
  <g transform="translate(80, 96)">
    <rect x="-34" y="-34" width="68" height="68" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="-25" y="-25" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <rect x="-17" y="-17" width="34" height="34" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="-10" y="-10" width="20" height="20" fill="#5b8abf"/>
    <line x1="0" y1="-34" x2="0" y2="-38" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="34"  x2="0" y2="38"  stroke="#ffffff" stroke-width="2"/>
    <line x1="-34" y1="0" x2="-38" y2="0" stroke="#ffffff" stroke-width="2"/>
    <line x1="34"  y1="0" x2="38"  y2="0" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Wordmark: RESILIENCE -->
  <text
    x="148" y="86"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="10"
    fill="#ffffff"
  >RESILIENCE</text>

  <!-- Tagline -->
  <text
    x="150" y="116"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="13"
    font-weight="400"
    letter-spacing="5"
    fill="#a8c0de"
  >SOFTWARE &amp; STRATEGY STUDIO</text>

  <!-- Subtle bottom rule -->
  <rect x="0" y="188" width="1128" height="3" fill="#5b8abf" opacity="0.5"/>
</svg>
