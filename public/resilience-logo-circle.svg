<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3356"/>
      <stop offset="100%" stop-color="#2b4c7e"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Nested circles -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ffffff" stroke-width="1.8"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="11" fill="#5b8abf"/>

  <!-- Crosshair tick marks -->
  <line x1="50" y1="7"  x2="50" y2="10" stroke="#ffffff" stroke-width="1.8"/>
  <line x1="50" y1="90" x2="50" y2="93" stroke="#ffffff" stroke-width="1.8"/>
  <line x1="7"  y1="50" x2="10" y2="50" stroke="#ffffff" stroke-width="1.8"/>
  <line x1="90" y1="50" x2="93" y2="50" stroke="#ffffff" stroke-width="1.8"/>
</svg>
