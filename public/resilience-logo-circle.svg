<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3356"/>
      <stop offset="100%" stop-color="#2b4c7e"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Nested squares logo centered in circle -->
  <g clip-path="url(#circle-clip)">
    <rect x="10" y="10" width="80" height="80" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="18" y="18" width="64" height="64" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <rect x="27" y="27" width="46" height="46" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="37" y="37" width="26" height="26" fill="#5b8abf"/>
    <line x1="50" y1="5" x2="50" y2="10" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="50" y1="90" x2="50" y2="95" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="5" y1="50" x2="10" y2="50" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="90" y1="50" x2="95" y2="50" stroke="#ffffff" stroke-width="1.8"/>
  </g>
</svg>
